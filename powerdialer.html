<!DOCTYPE html>
<html>
<head>
    <title>Power Dialer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: Arial; margin: 0; }
        .header { background: #fff; color: #000; padding: 25px; text-align: center; font-size: 28px; font-weight: bold; }
        .container { padding: 20px; text-align: center; max-width: 1200px; margin: 0 auto; }
        
        /* Mobile-optimized buttons */
        .btn { 
            background: #fff; color: #000; padding: 18px 25px; margin: 8px; 
            border: none; font-size: 16px; cursor: pointer; border-radius: 8px; 
            min-height: 60px; font-weight: bold;
        }
        
        .start { background: #00ff00; }
        .pause { background: #ffff00; }
        .stop { background: #ff0000; }
        .resume { background: #0080ff; }
        .skip { background: #ff8000; }
        
        #status { margin: 20px 0; padding: 20px; background: #222; border-radius: 8px; font-size: 16px; }
        #contacts { margin: 15px 0; color: #00ff00; font-weight: bold; font-size: 18px; }
        
        .dial-options { margin: 25px 0; }
        .radio-group { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }
        .radio-btn { 
            background: #fff; color: #000; border: none; padding: 15px 20px; 
            border-radius: 8px; cursor: pointer; min-width: 50px; font-size: 16px; font-weight: bold;
        }
        .radio-btn.active { background: #0080ff; color: #fff; }
        
        .controls { margin: 25px 0; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .file-section { margin: 25px 0; }
        
        /* Active Calls Display */
        .active-calls { 
            background: #111; border: 1px solid #333; border-radius: 10px; 
            margin: 25px 0; min-height: 120px;
        }
        .active-calls h3 { 
            background: #222; margin: 0; padding: 18px; border-radius: 10px 10px 0 0;
            border-bottom: 1px solid #444; color: #fff; font-size: 18px;
        }
        .call-list { padding: 15px; }
        .call-item { 
            background: #222; margin: 10px 0; padding: 15px; border-radius: 8px;
            border-left: 4px solid #0080ff; display: flex; justify-content: space-between;
            align-items: center; animation: slideIn 0.3s ease;
        }
        .call-item.calling { border-left-color: #ffff00; }
        .call-item.answered { border-left-color: #00ff00; }
        .call-item.completed { border-left-color: #888; }
        .call-item.failed { border-left-color: #ff0000; }
        
        .call-info { text-align: left; flex-grow: 1; }
        .call-name { font-weight: bold; font-size: 16px; color: #fff; }
        .call-number { color: #aaa; font-size: 14px; }
        .call-email { color: #888; font-size: 12px; font-style: italic; }
        .call-info-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
        .copy-btn {
            background: #333; color: #aaa; border: 1px solid #555;
            border-radius: 4px; padding: 2px 7px; font-size: 13px;
            cursor: pointer; line-height: 1;
        }
        .copy-btn:hover { background: #555; color: #fff; }
        .call-status { 
            background: #333; padding: 10px 15px; border-radius: 20px; 
            font-size: 12px; font-weight: bold; min-width: 80px; text-align: center;
        }
        .call-status.calling { background: #ffff00; color: #000; }
        .call-status.answered { background: #00ff00; color: #000; }
        .call-status.completed { background: #888; color: #fff; }
        .call-status.failed { background: #ff0000; color: #fff; }
        
        .no-calls { color: #666; font-style: italic; padding: 30px; text-align: center; }
        
        /* Connection Banner */
        .connection-banner {
            background: linear-gradient(45deg, #00ff00, #00cc00);
            color: #000; font-weight: bold; padding: 20px;
            border-radius: 10px; margin: 20px 0; display: none;
            animation: pulse 2s infinite; font-size: 16px;
        }
        .connection-banner.show { display: block; }
        
        /* Dialpad styles */
        .dialpad { 
            background: #111; border: 2px solid #fff; border-radius: 12px; 
            padding: 25px; margin: 25px auto; max-width: 400px; 
            display: none; 
        }
        .dialpad.show { display: block; }
        .dialpad h3 { margin-bottom: 20px; color: #fff; font-size: 20px; }
        .number-display { 
            background: #fff; color: #000; padding: 20px; text-align: center; 
            font-size: 22px; font-weight: bold; border-radius: 8px; 
            margin-bottom: 25px; min-height: 50px; 
        }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .keypad-btn { 
            background: #fff; color: #000; border: none; padding: 20px; 
            font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; 
            min-height: 65px;
        }
        .keypad-btn:hover { background: #ddd; }
        .keypad-btn.pressed { background: #0080ff; color: #fff; }
        .dialpad-controls { display: flex; flex-direction: column; gap: 12px; }
        .dialpad-control-btn { 
            background: #fff; color: #000; border: none; padding: 15px; 
            font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; 
            min-height: 55px;
        }
        .bottom-controls { margin: 25px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .keyboard-hint { color: #888; font-size: 14px; margin-top: 15px; text-align: center; font-style: italic; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        /* Mobile Optimization */
        @media (max-width: 768px) {
            .header { font-size: 24px; padding: 20px; }
            .container { padding: 15px; }
            
            /* Stack control buttons vertically on mobile */
            .controls { 
                flex-direction: column; 
                align-items: center;
                gap: 12px;
            }
            
            .btn { 
                width: 85%; 
                max-width: 300px;
                padding: 22px 25px;
                font-size: 18px;
                min-height: 70px;
            }
            
            /* Stack bottom buttons vertically */
            .bottom-controls { 
                flex-direction: column; 
                align-items: center;
                gap: 12px;
            }
            
            .bottom-controls .btn {
                width: 85%;
                max-width: 300px;
            }
            
            /* Make radio buttons larger on mobile */
            .radio-btn {
                padding: 18px 22px;
                font-size: 18px;
                min-width: 55px;
            }
            
            /* Larger touch targets for file input */
            #csvfile { 
                padding: 15px;
                font-size: 16px;
            }
            
            /* Better call list layout on mobile */
            .call-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .call-status {
                align-self: flex-end;
            }
            
            /* Larger dialpad on mobile */
            .dialpad {
                max-width: 95%;
                padding: 20px;
            }
            
            .keypad-btn {
                padding: 25px;
                font-size: 22px;
                min-height: 75px;
            }
            
            .number-display {
                font-size: 20px;
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="header">POWER DIALER</div>
    <div class="container">
        <h2>CALLS MADE: <span id="calls">0</span></h2>
        
        <!-- Connection Banner -->
        <div class="connection-banner" id="connectionBanner">
            CONNECTED: Contact name will appear here
        </div>
        
        <div class="file-section">
            <input type="file" id="csvfile" accept=".csv">
            <div id="contacts">No contacts loaded</div>
        </div>
        
        <div class="dial-options">
            <h3>Dial at once:</h3>
            <div class="radio-group">
                <button class="radio-btn active" data-value="1">1</button>
                <button class="radio-btn" data-value="2">2</button>
                <button class="radio-btn" data-value="3">3</button>
                <button class="radio-btn" data-value="4">4</button>
                <button class="radio-btn" data-value="5">5</button>
            </div>
            <div id="dial-count">Dialing 1 at once</div>
        </div>
        
        <!-- Active Calls Display -->
        <div class="active-calls">
            <h3>ACTIVE CALLS</h3>
            <div class="call-list" id="callList">
                <div class="no-calls">No active calls</div>
            </div>
        </div>
        
        <div id="status">Select CSV file to get started</div>
        
        <div class="controls">
            <button class="btn start" onclick="start()">START</button>
            <button class="btn pause" onclick="pause()">PAUSE</button>
            <button class="btn resume" onclick="resume()">RESUME</button>
            <button class="btn skip" onclick="skip()">SKIP</button>
            <button class="btn stop" onclick="stop()">STOP</button>
        </div>
        
        <div class="bottom-controls">
            <button class="btn" onclick="toggleDialpad()">DIALPAD</button>
            <button class="btn" onclick="showSettings()">SETTINGS</button>
        </div>
        
        <!-- Dialpad -->
        <div class="dialpad" id="dialpad">
            <h3>MANUAL DIALPAD</h3>
            <div class="number-display" id="numberDisplay">Enter number...</div>
            <div class="keypad">
                <button class="keypad-btn" onclick="addDigit('1')" id="key1">1</button>
                <button class="keypad-btn" onclick="addDigit('2')" id="key2">2</button>
                <button class="keypad-btn" onclick="addDigit('3')" id="key3">3</button>
                <button class="keypad-btn" onclick="addDigit('4')" id="key4">4</button>
                <button class="keypad-btn" onclick="addDigit('5')" id="key5">5</button>
                <button class="keypad-btn" onclick="addDigit('6')" id="key6">6</button>
                <button class="keypad-btn" onclick="addDigit('7')" id="key7">7</button>
                <button class="keypad-btn" onclick="addDigit('8')" id="key8">8</button>
                <button class="keypad-btn" onclick="addDigit('9')" id="key9">9</button>
                <button class="keypad-btn" onclick="addDigit('*')" id="keystar">*</button>
                <button class="keypad-btn" onclick="addDigit('0')" id="key0">0</button>
                <button class="keypad-btn" onclick="addDigit('#')" id="keyhash">#</button>
            </div>
            <div class="dialpad-controls">
                <button class="dialpad-control-btn" onclick="clearNumber()">CLEAR</button>
                <button class="dialpad-control-btn" onclick="callNumber()">CALL</button>
                <button class="dialpad-control-btn" onclick="toggleDialpad()">CLOSE</button>
            </div>
            <div class="keyboard-hint">
                💡 Use keyboard: 0-9, *, #, Backspace=clear, Enter=call, Escape=close
            </div>
        </div>
    </div>

    <script>
        let contacts = [];
        let simultaneousDials = 1;
        let isDialing = false;
        let isPaused = false;
        let dialedNumber = '';
        let callCount = 0;
        let activeCalls = [];
        let callIdCounter = 1;
        
        // Poll real backend for call status
        let pollInterval = null;

        function startPolling() {
            if (pollInterval) return;
            pollInterval = setInterval(pollBackend, 1500);
        }

        function stopPolling() {
            if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
        }

        async function pollBackend() {
            try {
                const [statusRes, callsRes] = await Promise.all([
                    fetch('/status'),
                    fetch('/active_calls_data')
                ]);
                const status = await statusRes.json();
                const callsData = await callsRes.json();

                // Update call count
                callCount = status.call_count;
                document.getElementById('calls').innerText = callCount;

                // Update contacts remaining
                if (status.contacts_remaining !== undefined) {
                    document.getElementById('contacts').innerText = 
                        status.contacts_remaining + ' contacts remaining';
                }

                // Update active calls from real data
                activeCalls = callsData.calls.map(c => ({
                    id: c.call_sid,
                    contact: { name: c.name, phone: c.phone, email: c.email },
                    status: c.status
                }));

                updateActiveCallsDisplay();

                // Connection banner
                if (status.connection_info) {
                    const banner = document.getElementById('connectionBanner');
                    banner.innerHTML = status.connection_info;
                    banner.classList.add('show');
                } else {
                    hideConnectionBanner();
                }

                // Status text
                document.getElementById('status').innerText = status.status;

            } catch(e) {
                console.log('Poll error:', e);
            }
        }
        
        function updateActiveCallsDisplay() {
            const callList = document.getElementById('callList');
            
            if (activeCalls.length === 0) {
                callList.innerHTML = '<div class="no-calls">No active calls</div>';
                stopRinging();
                return;
            }
            
            
            
            // Handle ring and connect sounds
            const callingCount = activeCalls.filter(call => call.status === "calling").length;
            if (callingCount > 0) {
                startRinging();
            } else {
                stopRinging();
            }
            
            // Play connect sound when someone answers
            const answeredCalls = activeCalls.filter(call => call.status === "answered");
            if (answeredCalls.length > 0) {
                const connectSound = document.getElementById("connectSound");
                connectSound.play().catch(e => console.log("Connect sound blocked by browser"));
            }
            
            callList.innerHTML = activeCalls.map(call => `
                <div class="call-item ${call.status}">
                    <div class="call-info">
                        <div class="call-info-row">
                            <div class="call-name">${call.contact.name}</div>
                            <button class="copy-btn" onclick="copyText('${call.contact.name}')" title="Copy name">&#x2398;</button>
                        </div>
                        <div class="call-info-row">
                            <div class="call-number">${call.contact.phone}</div>
                            <button class="copy-btn" onclick="copyText('${call.contact.phone}')" title="Copy number">&#x2398;</button>
                        </div>
                        <div class="call-info-row">
                            <div class="call-email">${call.contact.email || ""}</div>
                            ${call.contact.email ? `<button class="copy-btn" onclick="copyText('${call.contact.email}')" title="Copy email">&#x2398;</button>` : ""}
                        </div>
                    </div>
                    <div class="call-status ${call.status}">
                        ${call.status.toUpperCase()}${call.status === 'calling' ? '...' : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btns = document.querySelectorAll('.copy-btn');
                btns.forEach(btn => {
                    if (btn.getAttribute('onclick').includes(text)) {
                        btn.innerText = '✓';
                        setTimeout(() => btn.innerHTML = '&#x2398;', 1200);
                    }
                });
            }).catch(() => {
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            });
        }

        function showConnectionBanner(contact) {
            const banner = document.getElementById('connectionBanner');
            banner.innerHTML = `CONNECTED: ${contact.name} - ${contact.phone}`;
            banner.classList.add('show');
        }
        
        function hideConnectionBanner() {
            document.getElementById('connectionBanner').classList.remove('show');
        }
        
        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const dialpad = document.getElementById('dialpad');
            const isDialpadOpen = dialpad.classList.contains('show');
            
            if (isDialpadOpen) {
                let handled = false;
                
                if (e.key >= '0' && e.key <= '9') {
                    addDigit(e.key);
                    flashButton('key' + e.key);
                    handled = true;
                }
                else if (e.key === '*') {
                    addDigit('*');
                    flashButton('keystar');
                    handled = true;
                }
                else if (e.key === '#') {
                    addDigit('#');
                    flashButton('keyhash');
                    handled = true;
                }
                else if (e.key === 'Backspace') {
                    clearNumber();
                    handled = true;
                }
                else if (e.key === 'Enter') {
                    callNumber();
                    handled = true;
                }
                else if (e.key === 'Escape') {
                    toggleDialpad();
                    handled = true;
                }
                
                if (handled) {
                    e.preventDefault();
                }
            }
            
            // Global shortcuts
            if (e.key === ' ') {
                e.preventDefault();
                skip();
            }
            else if (e.key === 'Enter' && !isDialpadOpen) {
                start();
            }
        });
        
        function flashButton(buttonId) {
            const btn = document.getElementById(buttonId);
            if (btn) {
                btn.classList.add('pressed');
                setTimeout(() => btn.classList.remove('pressed'), 150);
            }
        }
        
        // Handle radio button selection
        document.querySelectorAll('.radio-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                simultaneousDials = parseInt(this.dataset.value);
                document.getElementById('dial-count').innerText = `Dialing ${simultaneousDials} at once`;
            });
        });
        
        // Dialpad functions
        function toggleDialpad() {
            document.getElementById('dialpad').classList.toggle('show');
        }
        
        function addDigit(digit) {
            if (dialedNumber.length < 15) {
                dialedNumber += digit;
                updateNumberDisplay();
            }
        }
        
        function updateNumberDisplay() {
            document.getElementById('numberDisplay').innerText = dialedNumber || 'Enter number...';
        }
        
        function clearNumber() {
            dialedNumber = '';
            updateNumberDisplay();
        }
        
        function callNumber() {
            if (!dialedNumber) {
                alert('Enter a number first!');
                return;
            }
            
            callCount++;
            document.getElementById('calls').innerText = callCount;
            
            const manualContact = { name: `Manual: ${dialedNumber}`, phone: dialedNumber };
            addActiveCall(manualContact, true);
            
            clearNumber();
            toggleDialpad();
        }
        
        function showSettings() {
            alert('Settings: SignalWire configuration, ngrok setup, etc.');
        }
        
        // Main dialer functions
        function start() { 
            if (contacts.length === 0) {
                document.getElementById('status').innerText = 'Load CSV first!';
                return;
            }
            isDialing = true;
            isPaused = false;
            document.getElementById('status').innerText = `STARTED - Dialing ${simultaneousDials} contacts at once...`; 
            
            simulateDialing();
        }
        
        function simulateDialing() {
            // Real dialing is handled by backend, just start polling
            startPolling();
        }
        
        function pause() { 
            isPaused = true;
            document.getElementById('status').innerText = 'PAUSED - Current calls will complete'; 
        }
        
        function resume() {
            if (!isDialing) {
                document.getElementById('status').innerText = 'Use START to begin dialing';
                return;
            }
            isPaused = false;
            document.getElementById('status').innerText = 'RESUMED - Continuing to dial...';
            simulateDialing();
        }
        
        function skip() {
            if (isDialing && !isPaused) {
                document.getElementById('status').innerText = 'SKIPPED - Moving to next contact(s)...';
                simulateDialing();
            }
        }
        
        function stop() { 
            isDialing = false;
            isPaused = false;
            activeCalls = [];
            stopPolling();
            updateActiveCallsDisplay();
            hideConnectionBanner();
            fetch('/hangup_calls', {method: 'POST'});
            document.getElementById('status').innerText = 'STOPPED - All calls ended'; 
        }
        
        // CSV handling
        document.getElementById('csvfile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('status').innerText = 'Reading CSV...';
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const csv = event.target.result;
                const lines = csv.split('\n');
                
                if (lines.length < 2) {
                    document.getElementById('status').innerText = 'CSV file is empty or invalid';
                    return;
                }
                
                const headers = lines[0].toLowerCase().split(',').map(h => h.trim());
                const nameCol = headers.findIndex(h => h.includes('name'));
                const phoneCol = headers.findIndex(h => h.includes('phone'));
                const emailCol = headers.findIndex(h => h.includes('email'));
                
                if (nameCol === -1 || phoneCol === -1) {
                    document.getElementById('status').innerText = 'CSV must have "name" and "phone" columns';
                    return;
                }
                
                contacts = [];
                for (let i = 1; i < lines.length; i++) {
                    const row = lines[i].split(',').map(cell => cell.trim());
                    if (row.length > Math.max(nameCol, phoneCol)) {
                        const name = row[nameCol];
                        const phone = row[phoneCol];
                        const email = emailCol !== -1 && row[emailCol] ? row[emailCol] : '';
                        if (name && phone) {
                            contacts.push({name: name, phone: phone, email: email});
                        }
                    }
                }
                
                document.getElementById('contacts').innerText = `${contacts.length} contacts loaded`;
                document.getElementById('status').innerText = `Ready to dial ${contacts.length} contacts from ${file.name}`;
            };
            
            reader.readAsText(file);
        });

        // --- Phone Ring Tone (Web Audio API) ---
        let ringAudioCtx = null;
        let isRinging = false;
        let ringTimeout = null;
        let activeRingGain = null;
        let activeOscillators = [];

        function startRinging() {
            if (isRinging) return;
            isRinging = true;
            if (!ringAudioCtx) ringAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            playRingCycle();
        }

        function playRingCycle() {
            if (!isRinging) return;
            const ctx = ringAudioCtx;
            const now = ctx.currentTime;
            const ringDuration = 1.6;

            const osc1 = ctx.createOscillator();
            const osc2 = ctx.createOscillator();
            const gain = ctx.createGain();

            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(ctx.destination);

            osc1.type = 'sine';
            osc2.type = 'sine';
            osc1.frequency.value = 440;
            osc2.frequency.value = 480;

            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.25, now + 0.05);
            gain.gain.setValueAtTime(0.25, now + ringDuration - 0.1);
            gain.gain.linearRampToValueAtTime(0, now + ringDuration);

            osc1.start(now);
            osc2.start(now);
            osc1.stop(now + ringDuration);
            osc2.stop(now + ringDuration);

            // Track so we can kill them instantly if needed
            activeRingGain = gain;
            activeOscillators = [osc1, osc2];

            // Ring pattern: 1.6s on, 3.4s off = 5s cycle
            ringTimeout = setTimeout(playRingCycle, 5000);
        }

        function stopRinging() {
            isRinging = false;
            if (ringTimeout) { clearTimeout(ringTimeout); ringTimeout = null; }
            // Immediately silence any currently playing ring
            if (activeRingGain) {
                try {
                    activeRingGain.gain.cancelScheduledValues(0);
                    activeRingGain.gain.setValueAtTime(0, ringAudioCtx.currentTime);
                } catch(e) {}
                activeRingGain = null;
            }
            activeOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
            activeOscillators = [];
        }
    </script>
