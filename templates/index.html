<!DOCTYPE html>
<html>
<head>
    <title>Power Dialer</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial; }
        .header { background: #fff; color: #000; padding: 20px; text-align: center; font-size: 24px; font-weight: bold; }
        .container { padding: 20px; text-align: center; }
        .btn { background: #fff; color: #000; padding: 15px 30px; margin: 10px; border: none; font-size: 16px; cursor: pointer; }
        .start { background: #00ff00; }
    </style>
</head>
<body>
    <div class="header">POWER DIALER WEB VERSION</div>
    <div class="container">
        <h2>CALLS MADE: <span id="count">0</span></h2>
        <br>
        <input type="file" id="csv" accept=".csv" style="display:none">
        <button class="btn" onclick="document.getElementById('csv').click()">Load CSV File</button>
        <br><br>
        <button class="btn start" onclick="alert('Start clicked!')">START DIALING</button>
        <button class="btn" onclick="alert('Pause clicked!')">PAUSE</button>
        <button class="btn" onclick="alert('Resume clicked!')">RESUME</button>
    </div>
</body>
</html>
